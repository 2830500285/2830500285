<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ByteWise execution signal board</title>
  <desc id="desc">A Morandi themed static metrics board for the ByteWise GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1EA"/>
      <stop offset="1" stop-color="#DFE7E5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#8D8178" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect x="18" y="18" width="1564" height="384" rx="34" fill="url(#bg)" stroke="#C9BFB2" stroke-width="2"/>

  <text x="88" y="90" fill="#2F3437" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="760">Execution Signal</text>
  <text x="90" y="126" fill="#6F7772" font-family="Consolas, Menlo, monospace" font-size="20">static profile board / no broken third-party widgets / refreshed from repository shape</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="92" y="166" width="292" height="142" rx="26" fill="#F9F6EF" stroke="#A69B8F"/>
    <text x="122" y="218" fill="#6F7772" font-size="22">Public repositories</text>
    <text x="122" y="274" fill="#2F3437" font-size="58" font-weight="780">18</text>
    <rect x="226" y="244" width="112" height="18" rx="9" fill="#D7E2E7"/>
    <rect x="226" y="272" width="82" height="18" rx="9" fill="#D9E1D3"/>

    <rect x="430" y="166" width="292" height="142" rx="26" fill="#F9F6EF" stroke="#A69B8F"/>
    <text x="460" y="218" fill="#6F7772" font-size="22">Visible stars</text>
    <text x="460" y="274" fill="#2F3437" font-size="58" font-weight="780">10</text>
    <circle cx="624" cy="254" r="30" fill="#E8D5CB" stroke="#C2A091"/>
    <path d="M624 230L631 247H649L635 258L640 276L624 266L608 276L613 258L599 247H617L624 230Z" fill="#F9F6EF" stroke="#C2A091"/>

    <rect x="768" y="166" width="292" height="142" rx="26" fill="#F9F6EF" stroke="#A69B8F"/>
    <text x="798" y="218" fill="#6F7772" font-size="22">Main stack</text>
    <text x="798" y="256" fill="#2F3437" font-size="28" font-weight="740">TS / Python / Vue</text>
    <text x="798" y="286" fill="#8D8178" font-size="18">runtime + modeling + interface</text>

    <rect x="1106" y="166" width="402" height="142" rx="26" fill="#F9F6EF" stroke="#A69B8F"/>
    <text x="1136" y="218" fill="#6F7772" font-size="22">Build orientation</text>
    <text x="1136" y="256" fill="#2F3437" font-size="28" font-weight="740">local-first AI systems</text>
    <text x="1136" y="286" fill="#8D8178" font-size="18">agents, evals, research, developer tools</text>
  </g>

  <g font-family="Consolas, Menlo, monospace" font-size="18" fill="#6F7772">
    <text x="92" y="360">GATES: spec clarity / executable workflow / measurable behavior / reusable artifact</text>
    <text x="1106" y="360">PALETTE: stone / sage / dusty blue / clay</text>
  </g>
</svg>
