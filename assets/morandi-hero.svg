<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ByteWise Morandi Systems Banner</title>
  <desc id="desc">A Morandi color technology banner for the ByteWise GitHub profile.</desc>
  <defs>
