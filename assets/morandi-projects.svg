    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="#B9C3BF" stroke-opacity="0.24" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="18" y="18" width="1564" height="564" rx="34" fill="url(#bg)" stroke="#C9BFB2" stroke-width="2"/>
