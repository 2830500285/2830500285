<svg width="1600" height="600" viewBox="0 0 1600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ByteWise project portfolio map</title>
  <desc id="desc">A Morandi themed project map showing the ByteWise agent, evaluation, research, and interface repositories.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="0.55" stop-color="#ECE6DA"/>
      <stop offset="1" stop-color="#DDE7E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
